<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/gallery.css">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>

<body>

    <div id="navbar"></div>

    <section class="gallery-hero">

        </div>
    </section>

        <div class="container">

                <span class="active" data-filter="all">All</span>

    <section class="gallery-section">
        <div class="container">
            <div class="gallery-grid">

                <div class="gallery-item tall" data-category="campus">
                    <img src="assets/images/mmrhss.jpeg" alt="Campus" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="events">
                    <img src="assets/images/home/gandhi darsan.jpg" alt="Event" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="sainik">
                    <img src="assets/images/home/band.jpg" alt="Sainik Activity" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="sainik">
                    <img src="assets/images/sainik3.JPG" alt="Sainik Activity" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="campus">
                    <img src="assets/images/alumni2.jpeg" alt="Alumni" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="events">
                    <img src="assets/images/events.jpeg" alt="Onam" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="student">
                    <img src="assets/images/exhibition.jpeg" alt="Science fest" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="sainik">
                    <img src="assets/images/sainik4.JPG" alt="Sainik Activity" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="events">
                    <img src="assets/images/yog3.JPG" alt="Yoga Day" class="gallery-img">
                </div>

                <div class="gallery-item" data-category="events">
                    <img src="assets/images/yoga1.JPG" alt="Yoga Day" class="gallery-img">
                </div>

            </div>
        </div>
    </section>

    <div id="footer"></div>
    <div class="image-modal" id="imageModal">
        <span class="modal-close" id="modalClose">&times;</span>

        <button class="modal-btn prev" id="prevBtn">&#10094;</button>

        <img id="modalImage" src="" alt="Gallery Image">

        <button class="modal-btn next" id="nextBtn">&#10095;</button>
    </div>

    <script src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const tabs = document.querySelectorAll(".gallery-tabs span");
        const items = document.querySelectorAll(".gallery-item");

        tabs.forEach(tab => {
            tab.addEventListener("click", () => {
                tabs.forEach(t => t.classList.remove("active"));
                tab.classList.add("active");

                const filter = tab.getAttribute("data-filter");

                items.forEach(item => {
                    const category = item.getAttribute("data-category");

                    if (filter === "all" || category === filter) {
                        item.style.display = "block";
                        setTimeout(() => {
                            item.style.opacity = "1";
                            item.style.transform = "scale(1)";
                        }, 50);
                    } else {
                        item.style.opacity = "0";
                        item.style.transform = "scale(.9)";
                        setTimeout(() => {
                            item.style.display = "none";
                        }, 300);
                    }
                });
            });
        });
    </script>

    <script>
        const galleryImages = document.querySelectorAll(".gallery-img");
        const imageModal = document.getElementById("imageModal");
        const modalImage = document.getElementById("modalImage");
        const modalClose = document.getElementById("modalClose");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        let currentIndex = 0;

        function showImage(index) {
            currentIndex = index;
            modalImage.src = galleryImages[currentIndex].src;
            imageModal.style.display = "flex";
        }

        galleryImages.forEach((img, index) => {
            img.addEventListener("click", () => {
                showImage(index);
            });
        });

        nextBtn.addEventListener("click", () => {
            currentIndex = (currentIndex + 1) % galleryImages.length;
            showImage(currentIndex);
        });

        prevBtn.addEventListener("click", () => {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            showImage(currentIndex);
        });

        modalClose.addEventListener("click", () => {
            imageModal.style.display = "none";
        });

        imageModal.addEventListener("click", (e) => {
            if (e.target === imageModal) {
                imageModal.style.display = "none";
            }
        });

        document.addEventListener("keydown", (e) => {
            if (imageModal.style.display === "flex") {
                if (e.key === "ArrowRight") {
                    nextBtn.click();
                }

                if (e.key === "ArrowLeft") {
                    prevBtn.click();
                }

                if (e.key === "Escape") {
                    imageModal.style.display = "none";
                }
            }
        });
    </script>
</body>

</html>
