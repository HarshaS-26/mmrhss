<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | MMRHSS & Sainik School</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/gallery.css">
</head>

<body>

    <div id="navbar"></div>

    <section class="gallery-hero">
        <div class="container">
            <div class="gallery-hero-content">
                <span class="section-tag">Moments & Memories</span>
                <h1>Gallery</h1>
                <p>A glimpse into campus life, academics, achievements and student activities.</p>
            </div>
        </div>
    </section>

    <section class="gallery-filter">
        <div class="container">
            <div class="gallery-tabs">
                <span class="active" data-filter="all">All</span>
                <span data-filter="campus">Campus</span>
                <span data-filter="academics">Academics</span>
                <span data-filter="sainik">Sainik Activities</span>
                <span data-filter="events">Events</span>
                <span data-filter="student">Student Life</span>
            </div>
        </div>
    </section>

    <section class="gallery-section">
        <div class="container">
            <div class="gallery-grid">

                <div class="gallery-item tall" data-category="campus">
                    <a href="assets/images/home/mmrhss.jpg">
                        <img src="assets/images/home/mmrhss.jpg" alt="Campus">
                    </a>
                </div>

                <div class="gallery-item" data-category="events">
                    <a href="assets/images/home/gandhi darsan.jpg">
                        <img src="assets/images/home/gandhi darsan.jpg" alt="Event">
                    </a>
                </div>

                <div class="gallery-item" data-category="sainik">
                    <a href="assets/images/home/band.jpg">
                        <img src="assets/images/home/band.jpg" alt="Sainik Activity">
                    </a>
                </div>

            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script src="js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const tabs = document.querySelectorAll(".gallery-tabs span");
        const items = document.querySelectorAll(".gallery-item");

        tabs.forEach(tab => {
            tab.addEventListener("click", () => {
                tabs.forEach(t => t.classList.remove("active"));
                tab.classList.add("active");

                const filter = tab.getAttribute("data-filter");

                items.forEach(item => {
                    const category = item.getAttribute("data-category");

                    if (filter === "all" || category === filter) {
                        item.style.display = "block";
                        setTimeout(() => {
                            item.style.opacity = "1";
                            item.style.transform = "scale(1)";
                        }, 50);
                    } else {
                        item.style.opacity = "0";
                        item.style.transform = "scale(.9)";
                        setTimeout(() => {
                            item.style.display = "none";
                        }, 300);
                    }
                });
            });
        });
    </script>
</body>

</html>
